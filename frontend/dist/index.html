    <!-- PWA manifest — href is updated by the inline script below before Angular boots -->
    <link id="pwa-manifest" rel="manifest" href="manifest-ar.webmanifest">

    <!-- Inline script: apply saved theme + lang + manifest before first paint (prevents flash) -->
    <script>
      (function() {
        var theme = localStorage.getItem('theme') || 'light';
        var lang  = localStorage.getItem('lang')  || 'ar';
        var dir   = lang === 'ar' ? 'rtl' : 'ltr';
        document.documentElement.setAttribute('dir', dir);
        document.documentElement.setAttribute('lang', lang);
        if (theme === 'dark') document.documentElement.classList.add('dark');
        // Point the manifest at the correct language variant
        var manifestEl = document.getElementById('pwa-manifest');
        if (manifestEl) {
          manifestEl.setAttribute('href', 'manifest-' + lang + '.webmanifest');
        }
      })();
    </script>

    <!-- App-loader splash — removed by ShellComponent constructor once Angular boots -->
    <style>
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f5f5f5;
      }
      @media (prefers-color-scheme: dark) { #app-loader { background: #0e1a17; } }
      html.dark #app-loader { background: #0e1a17; }

      /* Ring + logo share the same square; ring is absolute around the logo */
      #app-loader-wrap {
        position: relative;
        width: 96px;
        height: 96px;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #app-loader img {
        width: 60px;
        height: 60px;
        object-fit: contain;
        border-radius: 14px;
        position: relative;
        z-index: 1;
      }

      #app-loader-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 4px solid rgba(5,66,57,.15);
        border-top-color: #054239;
        border-right-color: #054239;
        animation: _al-spin .85s linear infinite;
      }
      @media (prefers-color-scheme: dark) {
        #app-loader-ring { border-color: rgba(76,175,135,.15); border-top-color: #4caf87; border-right-color: #4caf87; }
      }
      html.dark #app-loader-ring { border-color: rgba(76,175,135,.15); border-top-color: #4caf87; border-right-color: #4caf87; }

      @keyframes _al-spin { to { transform: rotate(360deg); } }

      #app-loader.fade-out {
        opacity: 0;
        transition: opacity .3s ease;
        pointer-events: none;
