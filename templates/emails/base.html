<!DOCTYPE html>
<html lang="{{ lang|default:'ar' }}" dir="{{ dir|default:'rtl' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block subject %}بريد من برمها{% endblock %}</title>
  <style>
    /* Reset */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #f4f4f4; font-family: Arial, 'Helvetica Neue', sans-serif; color: #333; }

    /* Wrapper */
    .email-wrap { max-width: 600px; margin: 32px auto; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,.10); }

    /* Header */
    .email-header {
      background: #002623;
      padding: 28px 32px;
      text-align: center;
    }
    .email-header .brand-name {
      font-size: 28px; font-weight: 800;
      color: #d97c00; letter-spacing: 1px;
      display: block; margin-bottom: 2px;
    }
    .email-header .brand-sub {
      font-size: 12px; color: #988561; letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* Body */
    .email-body { padding: 36px 32px; }
    .email-body h1 { font-size: 22px; font-weight: 700; color: #002623; margin-bottom: 12px; }
    .email-body p  { font-size: 15px; line-height: 1.7; color: #444; margin-bottom: 14px; }
    .email-body ul { padding-inline-start: 20px; margin-bottom: 14px; }
    .email-body ul li { font-size: 14px; line-height: 1.6; color: #444; margin-bottom: 6px; }

    /* CTA button */
    .cta-wrap { text-align: center; margin: 28px 0; }
    .cta-btn {
      display: inline-block;
      background: #d97c00; color: #fff;
      text-decoration: none; font-size: 16px; font-weight: 700;
      padding: 14px 36px; border-radius: 50px;
      letter-spacing: .5px;
    }
    @media (max-width: 480px) {
      .cta-btn { display: block; text-align: center; }
    }

    /* Divider */
    .divider { border: none; border-top: 1px solid #eee; margin: 24px 0; }

    /* Footer */
    .email-footer {
      background: #002623;
      padding: 20px 32px;
      text-align: center;
    }
    .email-footer p {
      font-size: 12px; color: #988561; line-height: 1.6; margin-bottom: 6px;
    }
    .email-footer a { color: #d97c00; text-decoration: none; }
    .social-links { margin-top: 10px; }
    .social-links a {
      display: inline-block; margin: 0 6px;
      font-size: 12px; color: #d97c00; text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="email-wrap">

    <!-- Header -->
    <div class="email-header">
      <span class="brand-name">barmha</span>
      <span class="brand-sub">barmha.com</span>
    </div>

    <!-- Body -->
    <div class="email-body">
      {% block body %}{% endblock %}
    </div>

    <!-- Footer -->
    <div class="email-footer">
      <p>{% block footer_note %}© 2025 barmha.com — جميع الحقوق محفوظة{% endblock %}</p>
      <p>
        {% block unsubscribe %}
        إذا لم تُنشئ حساباً على برمها، يمكنك تجاهل هذا البريد بأمان.
        {% endblock %}
      </p>
      <div class="social-links">
        <a href="https://barmha.com">الموقع</a>
        <a href="mailto:support@barmha.com">الدعم</a>
      </div>
    </div>

  </div>
</body>
</html>
